<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #0f0f0f, #000000);
    color: white;
    text-align: center;
}

/* ✨ частинки */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* контент */
.container {
    position: relative;
    z-index: 2;
    margin-top: 120px;
    animation: fadeIn 2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(50px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    font-size: 38px;
    letter-spacing: 2px;
}

p {
    font-size: 20px;
    margin: 10px;
    opacity: 0;
    animation: textFade 1s forwards;
}

p:nth-child(2) { animation-delay: 0.5s; }
p:nth-child(3) { animation-delay: 1s; }
p:nth-child(4) { animation-delay: 1.5s; }

@keyframes textFade {
    to {opacity: 1;}
}

/* кнопки */
button {
    padding: 15px 35px;
    font-size: 18px;
    margin: 25px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.3s;
}

/* YES */
#yes {
    background: #00ff99;
    box-shadow: 0 0 20px #00ff99;
}

#yes:hover {
    transform: scale(1.25);
    box-shadow: 0 0 40px #00ffcc;
}

/* NO */
#no {
    background: #ff0033;
    position: absolute;
    box-shadow: 0 0 20px #ff0033;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
    <h1>Invitation</h1>
    <p>You are invited to Nesodden this Wednesday.</p>
    <p>Expect a unique boat tour…</p>
    <p>and borscht, of course 🍲</p>

    <h2 style="margin-top:30px;">Do you agree?</h2>

    <button id="yes" onclick="yesClicked()">Yes</button>
    <button id="no" onmouseover="moveButton()">No</button>
</div>

<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg">
</audio>

<script>
// 😏 YES
function yesClicked() {
    document.body.innerHTML = `
        <h1 style="margin-top:150px; animation: fadeIn 1s;">
        Perfect. See you Wednesday.
        </h1>
    `;
}

// 😄 NO тікає і зменшується
function moveButton() {
    const button = document.getElementById("no");
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    button.style.left = x + "px";
    button.style.top = y + "px";

    button.style.transform = "scale(0.8)";
}

// ✨ частинки (вогники)
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 3,
        speedX: (Math.random() - 0.5) * 1.5,
        speedY: (Math.random() - 0.5) * 1.5
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
        if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
