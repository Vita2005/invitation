<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #0f0f0f, #000000);
    color: white;
    text-align: center;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
}

.container {
    position: relative;
    z-index: 2;
    margin-top: 120px;
    animation: fadeIn 2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(50px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    font-size: 38px;
}

p {
    font-size: 20px;
    margin: 10px;
    opacity: 0;
    animation: textFade 1s forwards;
}

p:nth-child(2) { animation-delay: 0.5s; }
p:nth-child(3) { animation-delay: 1s; }
p:nth-child(4) { animation-delay: 1.5s; }

@keyframes textFade {
    to {opacity: 1;}
}

button {
    padding: 15px 35px;
    font-size: 18px;
    margin: 25px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.3s;
}

#yes {
    background: #00ff99;
    box-shadow: 0 0 20px #00ff99;
}

#yes:hover {
    transform: scale(1.25);
    box-shadow: 0 0 40px #00ffcc;
}

#no {
    background: #ff0033;
    position: absolute;
    box-shadow: 0 0 20px #ff0033;
}
</style>
</head>

<body>

<canvas id="bgParticles"></canvas>
<canvas id="fireworks"></canvas>

<div class="container" id="content">
    <h1>Invitation</h1>
    <p>You are invited to Nesodden this Wednesday.</p>
    <p>Expect a unique boat tour…</p>
    <p>and borscht, of course 🍲</p>

    <h2 style="margin-top:30px;">Do you agree?</h2>

    <button id="yes" onclick="startFireworks()">Yes</button>
    <button id="no" onmouseover="moveButton()">No</button>
</div>

<script>
// 😄 NO тікає
function moveButton() {
    const button = document.getElementById("no");
    button.style.left = Math.random() * (window.innerWidth - 100) + "px";
    button.style.top = Math.random() * (window.innerHeight - 50) + "px";
}

// 🎆 САЛЮТ
function startFireworks() {
    document.getElementById("content").innerHTML =
        "<h1 style='margin-top:150px;'>Perfect. See you Wednesday.</h1>";

    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];

    function createExplosion(x, y) {
        for (let i = 0; i < 80; i++) {
            particles.push({
                x: x,
                y: y,
                angle: Math.random() * Math.PI * 2,
                speed: Math.random() * 5 + 2,
                life: 100
            });
        }
    }

    function animate() {
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        particles.forEach((p, i) => {
            p.x += Math.cos(p.angle) * p.speed;
            p.y += Math.sin(p.angle) * p.speed;
            p.life--;

            ctx.beginPath();
            ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
            ctx.fillStyle = "hsl(" + Math.random() * 360 + ",100%,50%)";
            ctx.fill();

            if (p.life <= 0) particles.splice(i, 1);
        });

        requestAnimationFrame(animate);
    }

    setInterval(() => {
        createExplosion(
            Math.random() * canvas.width,
            Math.random() * canvas.height / 2
        );
    }, 500);

    animate();
}

// ✨ фон-вогники
const canvasBg = document.getElementById("bgParticles");
const ctxBg = canvasBg.getContext("2d");

canvasBg.width = window.innerWidth;
canvasBg.height = window.innerHeight;

let bgParticles = [];

for (let i = 0; i < 80; i++) {
    bgParticles.push({
        x: Math.random() * canvasBg.width,
        y: Math.random() * canvasBg.height,
        size: Math.random() * 2,
        speedX: (Math.random() - 0.5),
        speedY: (Math.random() - 0.5)
    });
}

function animateBg() {
    ctxBg.clearRect(0, 0, canvasBg.width, canvasBg.height);

    bgParticles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;

        ctxBg.beginPath();
        ctxBg.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctxBg.fillStyle = "white";
        ctxBg.fill();
    });

    requestAnimationFrame(animateBg);
}

animateBg();
</script>

</body>
</html>
